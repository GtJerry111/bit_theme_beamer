# BIT Beamer Theme 插件配置
# 格式:
#   [插件名]
#   repo = GitHub用户名/仓库名
#   branch = 分支名
#   files = 文件1 文件2 文件3
#   name = 插件显示名称

# 插件: 示例 - example
[example]
repo = user/repo
branch = main
files = file1.sty file2.tex
name = 示例插件

# 插件: 新三国天意爷主题 - TianYiYe
[TianYiYe]
repo = FvNCCR228/bit_beamer_theme
branch = main
files = main.pdf fonts/README.md
name = 新三国天意爷主题

# 继续添加更多插件
