meta:
  theme: BIT
  sty: beamerthemebit.sty
  isa_version: 2
  engine: xelatex
  aspectratio: '169'
provides:
- Base@1
- Zsem@1
- SpecialFrames@1
- Density@1
- OverflowGuard@1
- Theorems@1
- Columns@1
options:
- name: ColorDisplay
  values:
  - BITA
  - BITB
  - Custom
  default: BITA
- name: BlockDisplay
  values:
  - colorful
  - followtheme
  - allgrey
  default: colorful
- name: CodeTheme
  values:
  - listing
  - minted
  - minted2
  default: listing
- name: MintedStyle
  values:
  - lightmode
  - darkmode
  default: lightmode
- name: LanguageMode
  values:
  - cn
  - en
  default: cn
- name: Miniframes
  values:
  - follow
  - separate
  - none
  default: follow
- name: NavigationTool
  values:
  - 1-2-3
  - 1-2
  - 1-3
  - 2-3
  - 1
  - 2
  - 3
  - none
  default: 1-2-3
- name: LogoWidth
  type: dimen
  default: 48pt
- name: FontTheme
  values:
  - Auto
  - Ubuntu
  - Win
  - Mac
  - Fandol
  - Source-Han
  - Source-Han(Local)
  - ZhongYi(Local)
  - Custom
  default: Auto
- name: MathFont
  values:
  - LM
  - XITS
  default: LM
- name: BIBMode
  values:
  - biber
  - none
  default: biber
- name: BIBStyle
  values:
  - biber-gb7714
  default: biber-gb7714
- name: ContentMuticols
  values:
  - true
  - false
  default: true
- name: Background
  values:
  - BIT-Full
  - BIT-Lite
  - none
  - Custom
  default: BIT-Full
- name: VI
  values:
  - BIT
  - Custom
  default: BIT
- name: SectionNavStyle
  values:
  - auto
  - full
  - current
  - none
  default: auto
- name: SecBarWidth
  values:
  - auto
  type: dimen
  default: auto
- name: OverlayMode
  values:
  - direct
  - fade
  - none
  default: direct
- name: overflowguard
  values:
  - true
  - false
  default: 'on'
capacity:
  normal:
    bullets_per_frame: 11
    figure_plus_bullets: 4
    blocks_per_frame: 4
  measured_at:
    bullet_words: 8
custom_instructions:
- cmd: bittheorem
  args: 2
  optional_args: 1
- cmd: bitlemma
  args: 2
  optional_args: 1
- cmd: bitcorollary
  args: 2
  optional_args: 1
- cmd: bitproposition
  args: 2
  optional_args: 1
- cmd: bitdefinition
  args: 2
  optional_args: 1
- cmd: bitproperty
  args: 2
  optional_args: 1
- cmd: bitexample
  args: 2
  optional_args: 1
- cmd: bitremark
  args: 2
  optional_args: 1
- cmd: bitalgorithm
  args: 2
  optional_args: 1
- cmd: bitproof
  args: 2
  optional_args: 1
- cmd: bitaxiom
  args: 2
  optional_args: 1
- cmd: bitcondition
  args: 2
  optional_args: 1
- cmd: bitconclusion
  args: 2
  optional_args: 1
- cmd: bitassumption
  args: 2
  optional_args: 1
- cmd: bitcode
  args: 3
  optional_args: 2
- cmd: bitcode*
  args: 3
  optional_args: 2
- cmd: bitcodeinput
  args: 4
  optional_args: 2
- cmd: bitcodeinputnocounter
  args: 4
  optional_args: 2
- cmd: mailbit
  args: 1
- cmd: cmd
  args: 1
- cmd: env
  args: 1
- cmd: pkg
  args: 1
- cmd: cls
  args: 1
- cmd: marg
  args: 1
- cmd: oarg
  args: 1
- cmd: bitgoto
  args: 1
- cmd: bitgoback
  args: 1
structural_idioms:
- rule: deck_requires_short_title
  severity: error
- rule: block_requires_title
  severity: error
- rule: section_name_max_chars
  value: 20
  severity: warn
- rule: use_cmyk_xcolor
  severity: error
prose: "BIT Beamer Theme 是北京理工大学的专属模板。默认语言为中文（LanguageMode=cn），仅在用户明确要求时才切换为英文（LanguageMode=en）。\n\
  \n## 自动封面（重要）\nBIT 主题在 \\AtBeginDocument 中自动生成封面页（使用 \\titlepage 和完整的 BIT 视觉设计：校徽、装饰曲线、背景）。\n\
  因此：\n- order.txt 中 **不要** 包含 title frame（S00）\n- 第一个 frame 应该是第一个内容帧（如报告提纲）\n- 不要在\
  \ frame 中手动构建封面布局\n- 不要使用 \\titlepage 命令（会导致 \\newsavebox 重复定义错误）\n- 只需在 preamble\
  \ 中正确设置 \\title、\\author、\\institute、\\date 即可\n\n## 必需的宏包\n以下宏包是 BIT 主题正常运作所必需的，必须在\
  \ preamble 中加载（在 \\usetheme 之后、\\begin{document} 之前）：\n\\usepackage{array}\n\\usepackage{algorithm,algorithmic}\n\
  \\usepackage[english]{babel}\n\\usepackage{color}\n\\usepackage{url}\n\\usepackage{multicol,multirow}\n\
  \\usepackage{ulem}\n\\usepackage{booktabs}\n\\usepackage{cprotect}\n\\usepackage{makecell}\n\
  \\usepackage{listings}\n\\usepackage{subcaption}\n\\usepackage{varioref,cleveref}\n\
  \n## 推荐的 \\usetheme 选项\n以下选项推荐在 paper2beamer 生成的 deck 中使用：\n- NavigationTool=1-2-3：显示页脚导航工具栏（前进/后退/首页等）\n\
  - BIBMode=none：paper2beamer 不生成参考文献，避免 biber 依赖\n- Background=BIT-Full：使用完整背景设计\n\
  \n## 编译约束\n编译前必须在 \\documentclass 之前添加：\n  \\PassOptionsToPackage{cmyk}{xcolor}\n\
  以避免 PDF 色彩偏移。\n\n## 语义颜色\n- bita（校徽红褐色）：主强调色，用于关键概念、核心结论\n- bitb（校徽深蓝色）：用于定义类 block（BlockDefinitionC）\n\
  - bitc（校徽叶绿色）：用于引理类 block（BlockLemmaC）\n- bitd（校徽描边金褐色）：用于条件类 block（BlockConditionC）\n\
  - bite（中性灰）：用于辅助/弱化内容\n\n## 定理与证明\n永远使用 BIT 专属环境：bittheorem、bitlemma、bitcorollary、bitproposition、bitdefinition、bitproperty、bitexample、bitremark、bitalgorithm、bitproof、bitaxiom、bitcondition、bitconclusion、bitassumption。永远不要使用\
  \ Beamer 的通用 theorem/definition 环境。\n\n## 代码高亮\n永远使用 BIT 专属环境：bitcode、bitcode*、bitcodeinput、bitcodeinputnocounter。默认\
  \ CodeTheme=listing，不需要 -shell-escape。仅在用户明确要求时才切换为 minted。\n\n## 参考文献\n默认使用 BIBMode=biber\
  \ + BIBStyle=biber-gb7714（GB/T 7714-2015 国标）。paper2beamer 生成的 deck 建议设置 BIBMode=none。\n\
  \n## 帧密度与页数预算\n每帧保持一个核心观点。节标题控制在 20 字符以内。每个 block 必须有标题。\n\n**Overlay 膨胀：** Beamer\
  \ overlay specs（<1->, <2-> 等）每个产生一个独立的 PDF 页。\n在估算页数时，需要考虑 overlay 膨胀：\n- 一个包含 5\
  \ 个 \\item<1-> 的 frame 产生 5 个 PDF 页，不是 1 个\n- overlay_page_multiplier ≈ 1.0（每个 overlay\
  \ spec 约产生 1 个额外 PDF 页）\n- 页数预算指的是 **物理 PDF 页数**，不是逻辑帧数\n- 15 分钟的 talk → 12-18 个\
  \ PDF 页（不是 12-18 个逻辑帧）\n\n## 图片命名\nDocling 提取的图片使用哈希命名（如 image_000000_0d1f7423...png），在\
  \ LaTeX 中引用时行过长。\n建议在 ingest 后处理中将图片重命名为 figure-001.png、figure-002.png 等格式，并同步更新\
  \ paper-content.md 中的引用。\n  ## Intent 阶段必须询问用户的问题\n\n  在 Intent 阶段，必须询问用户以下问题，并根据回答配置主题选项：\n\
  \n  ### 1. 语言偏好（必须询问）\n  \"你的幻灯片使用中文还是英文？\"\n  - 中文 → LanguageMode=cn（默认）\n  - 英文\
  \ → LanguageMode=en（TOC 标题变为 \"Outline\"，定理环境用英文）\n\n  ### 2. 面向人群（必须询问）\n  \"你的听众是谁？\"\
  \n  - 学术同行（同领域研究者）→ OverlayMode=fade, 定理环境多，代码高亮\n  - 答辩委员会（跨领域专家）→ OverlayMode=direct,\
  \ Density=dense, 内容密集\n  - 学生/教学 → OverlayMode=fade 或 none, 动画帮助理解\n  - 会议演讲（混合背景）→\
  \ OverlayMode=direct, NavigationTool=1-2-3 方便跳转\n\n  ### 3. 演讲时间（必须询问）\n  \"你的演讲时长是多少分钟？\"\
  \n  用于计算页数预算（考虑 overlay 膨胀因子）：\n  - 10 分钟 → 8-12 页\n  - 15 分钟 → 12-18 页\n  - 20\
  \ 分钟 → 18-25 页\n  - 30 分钟 → 25-35 页\n\n  ### 4. 框架偏好（必须询问）\n  \"你希望幻灯片如何组织？\"\n\
  \  - 按论文章节（Introduction → Method → Results → Conclusion）→ 使用 \\section 分隔，SubsectionTOC=on\n\
  \  - 按逻辑主题（Problem → Approach → Demo → Takeaway）→ 可能不用 \\section，SubsectionTOC=off\n\
  \  - 混合模式（主框架按章节，子主题按逻辑）→ 使用 \\subsection，SubsectionTOC=first-only\n\n  ## 章节导航（重要）\n\
  \  默认 SectionNavStyle=auto 会自动检测章节数量：\n  - 章节名总宽度 ≤ secbar 宽度：显示所有章节名（full 模式）\n\
  \  - 章节名总宽度 > secbar 宽度：自动回退到只显示当前章节名（current 模式）\n  对于论文转换，推荐使用默认值 auto。如果用户明确要求显示所有章节，可设置\
  \ full。\n\n  ## 不要生成 TOC frame（重要）\n  BIT 主题通过 SubsectionTOC=on 在每个小节开始自动生成渐进式目录（双栏、当前章节高亮、其他章节淡化）。\n\
  \  因此：\n  - order.txt 中 **不要** 包含 TOC frame\n  - 不要生成 `\\begin{frame}{目录}\\tableofcontents\\\
  end{frame}`\n  - 让主题的自动 TOC 机制处理目录显示\n\n  ## 目录自动双栏\n  当章节数 > 5 时，主题自动启用双栏目录，左右平衡分布章节。\n\
  \  用户无需手动设置 ContentMuticols 选项。\n\n  ## 推荐的 \\usetheme 选项（paper2beamer）\n  以下选项推荐在\
  \ paper2beamer 生成的 deck 中使用：\n  - SectionNavStyle=auto（默认）：自动适应章节数量\n  - SecBarWidth=auto（默认）：自适应章节栏宽度\n\
  \  - OverlayMode=direct（默认）：所有内容直接显示，无动画\n  - overflowguard=on（默认）：启用溢出保护\n  - NavigationTool=1-2-3：显示页脚导航工具栏\n\
  \  - BIBMode=none：paper2beamer 不生成参考文献\n  - Background=BIT-Full：使用完整背景设计\n"
